<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>น้องหุ่นยนต์ 🤖 Pro (Stable)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2f; --card: #2a2a40; --text: #f0f4ff;
            --blue: #5b8dee; --blue-s: #3a6dcc;
            --red: #ff4757;  --red-s: #cc2333;
            --green: #2ed573; --orange: #ffa502;
            --purple: #a29bfe; --gray: #4a4a6a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Kanit', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px;
        }
        .container { width: 100%; max-width: 560px; }
        h2 { text-align: center; font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 14px; text-shadow: 0 2px 10px rgba(91,141,238,0.5); }

        .status-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
        .badge {
            background: var(--card); border-radius: 20px; padding: 6px 14px;
            font-size: 13px; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        #mute-toggle { cursor: pointer; border: 1px solid transparent; }
        #mute-toggle:active { transform: scale(0.95); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gray); transition: background 0.3s; }
        .dot.online  { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }

        .video-wrapper {
            position: relative; width: 100%; border-radius: 16px; overflow: hidden;
            background: #000; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            margin-bottom: 20px; aspect-ratio: 4/3;
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--card);
        }
        
        #video-stream { width: 100%; height: 100%; object-fit: cover; display: none; transform: rotate(180deg); }
        #no-signal { position: absolute; color: #888; font-size: 16px; text-align: center; font-weight: 600; }
        
        .hud-overlay { position: absolute; top: 10px; right: 10px; background: rgba(255,50,50,0.9); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; display: none; animation: blink 1s infinite; z-index: 10; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 280px; margin: 0 auto 20px auto; }
        .btn-ctrl {
            background: var(--blue); color: #fff; border: none; padding: 22px 0; border-radius: 16px; font-size: 22px;
            cursor: pointer; box-shadow: 0 6px 0 var(--blue-s); transition: transform 0.05s, box-shadow 0.05s; font-family: inherit;
        }
        .btn-ctrl:active, .btn-ctrl.pressed { transform: translateY(6px); box-shadow: 0 0px 0 var(--blue-s); }
        .btn-stop { background: var(--red); box-shadow: 0 6px 0 var(--red-s); font-size: 16px; font-weight: bold; }
        .btn-stop:active, .btn-stop.pressed { box-shadow: 0 0px 0 var(--red-s); }
        .up { grid-column:2; } .left { grid-column:1; grid-row:2; } .stop { grid-column:2; grid-row:2; } .right { grid-column:3; grid-row:2; } .down { grid-column:2; grid-row:3; }

        .action-panel { display: flex; gap: 12px; justify-content: center; width: 100%; max-width: 350px; margin: 0 auto; flex-wrap: wrap; }
        .btn-action {
            flex: 1; padding: 16px 10px; border-radius: 16px; border: none; font-size: 15px; font-weight: 600; min-width: 140px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-family: inherit;
        }
        .btn-mic { background: var(--orange); color: #fff; box-shadow: 0 4px 0 #c47a00; }
        .btn-mic.active { background: var(--red); box-shadow: 0 0 15px var(--red); transform: scale(0.95); }
        .btn-record { background: var(--purple); color: #fff; box-shadow: 0 4px 0 #7c6fd4; }
        .btn-record.active { background: var(--red); box-shadow: 0 0 15px var(--red); transform: scale(0.95); }
        
        #record-canvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>🤖 ระบบควบคุมหุ่นยนต์อัจฉริยะ</h2>
    <div class="status-bar">
        <div class="badge"><div id="cloud-dot" class="dot offline"></div>Cloud</div>
        <div class="badge"><div id="robot-dot" class="dot offline"></div>Robot</div>
        <div class="badge" id="mute-toggle" style="background: var(--blue);">🔊 <span id="audio-status" style="color:#fff;">แตะจอเพื่อเปิดเสียง</span></div>
    </div>
    
    <div class="video-wrapper">
        <div id="no-signal">💤 รอสัญญาณภาพ...</div>
        <img id="video-stream" alt="Video">
        <canvas id="record-canvas"></canvas>
        <div id="rec-indicator" class="hud-overlay">🔴 REC</div>
    </div>

    <div class="d-pad">
        <button class="btn-ctrl up"   data-cmd="F">▲</button>
        <button class="btn-ctrl left" data-cmd="L">◀</button>
        <button class="btn-ctrl btn-stop stop" data-cmd="S">หยุด</button>
        <button class="btn-ctrl right" data-cmd="R">▶</button>
        <button class="btn-ctrl down"  data-cmd="B">▼</button>
    </div>

    <div class="action-panel">
        <button id="mic-btn" class="btn-action btn-mic">🎙️ กดค้างพูด</button>
        <button id="record-btn" class="btn-action btn-record">📹 บันทึกวิดีโอ</button>
    </div>
</div>

<script>
// ==========================================
// CONFIGURATION
// ==========================================
const WS_HOST     = 'robot-relay-67r7.onrender.com'; 
const WS_URL      = `wss://${WS_HOST}/?type=webapp`;
const SAMPLE_RATE = 16000;
const MIC_GAIN    = 6.0;

// ==========================================
// DOM & Contexts
// ==========================================
const cloudDot    = document.getElementById('cloud-dot');
const robotDot    = document.getElementById('robot-dot');
const audioStatus = document.getElementById('audio-status');
const muteToggle  = document.getElementById('mute-toggle');
const imgEl       = document.getElementById('video-stream');
const noSignal    = document.getElementById('no-signal');
const micBtn      = document.getElementById('mic-btn');
const recordBtn   = document.getElementById('record-btn');
const recIndicator= document.getElementById('rec-indicator');

const canvas      = document.getElementById('record-canvas');
const ctx2d       = canvas.getContext('2d', { alpha: false });

let ws, robotTimer, reconnectTimer;
const spkCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
let nextPlayTime = 0;
let isMuted = false;

// ⚠️ ตัวแปรป้องกันภาพค้าง
let isImageLoading = false;
let imageLoadTimeout;

muteToggle.addEventListener('click', () => {
    isMuted = !isMuted;
    if (isMuted) {
        muteToggle.style.background = 'var(--red)';
        muteToggle.innerHTML = `🔇 <span id="audio-status" style="color:#fff;">ปิดเสียงอยู่</span>`;
    } else {
        muteToggle.style.background = 'var(--blue)';
        muteToggle.innerHTML = `🔊 <span id="audio-status" style="color:#fff;">พร้อมใช้งาน</span>`;
        if (spkCtx.state === 'suspended') spkCtx.resume();
    }
});

function unlockAudio() {
    if (!isMuted && spkCtx.state === 'suspended') {
        spkCtx.resume().catch(()=>{});
        if(!isMuted) document.getElementById('audio-status').textContent = 'พร้อมใช้งาน';
    }
}
document.addEventListener('pointerdown', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });

// ==========================================
// ระบบอัดวิดีโอ โหมดประหยัด CPU 
// ==========================================
let mediaRecorder = null, recChunks = [], isRecording = false;
recordBtn.addEventListener('click', () => isRecording ? stopRec() : startRec());

function startRec() {
    recChunks = [];
    canvas.width  = imgEl.naturalWidth  || 320;
    canvas.height = imgEl.naturalHeight || 240;
    
    const stream = canvas.captureStream(10); 
    let mime = 'video/webm';
    if (MediaRecorder.isTypeSupported('video/webm; codecs=vp8')) {
        mime = 'video/webm; codecs=vp8';
    }
    
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const blob = new Blob(recChunks, { type: 'video/webm' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Robot_Video_${Date.now()}.webm`;
        document.body.appendChild(a); 
        a.click(); 
        a.remove();
    };
    
    mediaRecorder.start(1000); 
    isRecording = true;
    recordBtn.classList.add('active'); 
    recordBtn.innerHTML = '⏹️ หยุดบันทึก';
    recIndicator.style.display = 'block';
}

function stopRec() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    recordBtn.classList.remove('active'); 
    recordBtn.innerHTML = '📹 บันทึกวิดีโอ';
    recIndicator.style.display = 'none';
}

// ==========================================
// WebSocket & Video Renderer 
// ==========================================
let isConnecting = false;

function connectWS() {
    if (isConnecting || (ws && ws.readyState === WebSocket.OPEN)) return;
    isConnecting = true;
    
    ws = new WebSocket(WS_URL);
    ws.binaryType = 'arraybuffer'; 

    ws.onopen = () => {
        cloudDot.className = 'dot online';
        isConnecting = false;
        clearTimeout(reconnectTimer);
    };
    
    ws.onclose = () => {
        cloudDot.className = 'dot offline';
        robotDot.className = 'dot offline';
        isConnecting = false;
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectWS, 2000); 
    };

    ws.onmessage = (event) => {
        if (typeof event.data === 'string') {
            if (event.data === 'ROBOT_PING') {
                robotDot.className = 'dot online';
                clearTimeout(robotTimer);
                robotTimer = setTimeout(() => robotDot.className = 'dot offline', 5000);
            }
            return;
        }

        const view = new DataView(event.data);
        if (view.byteLength >= 2 && view.getUint8(0) === 0xFF && view.getUint8(1) === 0xD8) {
            
            // ⚠️ 1. ถ้ารูปเก่ายังโหลดไม่เสร็จ ให้ทิ้งรูปใหม่ไปเลย ป้องกันคิวล้นจนเว็บแฮงค์
            if (isImageLoading) return;
            isImageLoading = true;

            // ⚠️ 2. ตั้งเวลาเผื่อเหนียว ถ้าเบราว์เซอร์เอ๋อ 1 วิแล้วรูปยังไม่มา ให้ปลดล็อคคิวทันที
            clearTimeout(imageLoadTimeout);
            imageLoadTimeout = setTimeout(() => { isImageLoading = false; }, 1000);

            const blob = new Blob([event.data], { type: 'image/jpeg' });
            if (window.currentImgUrl) {
                URL.revokeObjectURL(window.currentImgUrl);
            }
            window.currentImgUrl = URL.createObjectURL(blob);
            
            imgEl.onload = () => {
                isImageLoading = false; // ปลดล็อคคิวเมื่อรูปแสดงผลสำเร็จ
                clearTimeout(imageLoadTimeout);
                
                noSignal.style.display = 'none';
                imgEl.style.display = 'block';
                
                if (isRecording) {
                    if (canvas.width !== imgEl.naturalWidth) {
                        canvas.width = imgEl.naturalWidth || 320;
                        canvas.height = imgEl.naturalHeight || 240;
                    }
                    ctx2d.save();
                    ctx2d.translate(canvas.width, canvas.height);
                    ctx2d.rotate(Math.PI);
                    ctx2d.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
                    ctx2d.restore();
                }
            };
            
            imgEl.onerror = () => { isImageLoading = false; }; // ปลดล็อคถ้าโหลดพลาด
            imgEl.src = window.currentImgUrl;
            
        } else {
            playAudioData(event.data);
        }
    };
}
connectWS();

function sendCmd(cmd) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(cmd);
}

// ==========================================
// Motor Controls
// ==========================================
document.querySelectorAll('.btn-ctrl').forEach(btn => {
    const cmd = btn.dataset.cmd;
    let isActive = false;

    const startCmd = (e) => {
        e.preventDefault();
        if(isActive) return; isActive = true;
        btn.classList.add('pressed'); sendCmd(cmd);
    };
    const stopCmd = (e) => {
        e.preventDefault();
        if(!isActive) return; isActive = false;
        btn.classList.remove('pressed'); if (cmd !== 'S') sendCmd('S');
    };

    btn.addEventListener('touchstart', startCmd, { passive: false });
    btn.addEventListener('touchend', stopCmd, { passive: false });
    btn.addEventListener('touchcancel', stopCmd, { passive: false });
    btn.addEventListener('mousedown', startCmd);
    btn.addEventListener('mouseup', stopCmd);
    btn.addEventListener('mouseleave', stopCmd);
});

// ==========================================
// Audio Processing
// ==========================================
function playAudioData(arrayBuffer) {
    if (isMuted || isTalking) return; 

    if (spkCtx.state === 'suspended') spkCtx.resume().catch(()=>{});

    try {
        const int16 = new Int16Array(arrayBuffer);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) {
            float32[i] = int16[i] / 32768.0;
        }

        const audioBuf = spkCtx.createBuffer(1, float32.length, SAMPLE_RATE);
        audioBuf.getChannelData(0).set(float32);
        
        const src = spkCtx.createBufferSource();
        src.buffer = audioBuf;
        src.connect(spkCtx.destination);

        const now = spkCtx.currentTime;
        if (nextPlayTime < now || nextPlayTime > now + 0.5) {
            nextPlayTime = now + 0.05; 
        }
        
        src.start(nextPlayTime);
        nextPlayTime += audioBuf.duration;

        document.getElementById('audio-status').textContent = 'หุ่นกำลังพูด...';
        clearTimeout(window._spkTimer);
        window._spkTimer = setTimeout(() => {
            if(!isMuted) document.getElementById('audio-status').textContent = 'พร้อมใช้งาน';
        }, 400);
    } catch(e) { } 
}

// ==========================================
// Microphone (Stream)
// ==========================================
let micStream, micNode, isTalking = false;

async function startMic(e) {
    if (e) e.preventDefault();
    if (isTalking) return;
    if (spkCtx.state === 'suspended') spkCtx.resume();

    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
        micBtn.classList.add('active');
        micBtn.innerHTML = '🔊 ปล่อยเมื่อพูดจบ...';
        isTalking = true;

        const source = spkCtx.createMediaStreamSource(micStream);
        micNode = spkCtx.createScriptProcessor(1024, 1, 1);
        
        micNode.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                let s = input[i] * MIC_GAIN;
                s = Math.max(-1, Math.min(1, s));
                output[i] = s < 0 ? s * 32768 : s * 32767;
            }
            if(ws && ws.readyState === WebSocket.OPEN) ws.send(output.buffer);
        };
        source.connect(micNode);
        micNode.connect(spkCtx.destination);
    } catch (err) { alert("กรุณาอนุญาตให้ใช้ไมค์"); }
}

function stopMic(e) {
    if (e) e.preventDefault();
    if (!isTalking) return;
    isTalking = false;
    micBtn.classList.remove('active');
    micBtn.innerHTML = '🎙️ กดค้างพูด';
    
    if (micNode) { micNode.disconnect(); micNode = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}

micBtn.addEventListener('touchstart', startMic, { passive: false });
micBtn.addEventListener('touchend', stopMic, { passive: false });
micBtn.addEventListener('touchcancel', stopMic, { passive: false });
micBtn.addEventListener('mousedown', startMic);
micBtn.addEventListener('mouseup', stopMic);
micBtn.addEventListener('mouseleave', stopMic);

</script>
</body>
</html>
