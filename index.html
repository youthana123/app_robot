<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cute Robot 🤖</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #faf4f4; --text-color: #5c4d4d; --card-bg: #ffffff; 
            --btn-blue: #a3c9e2; --btn-red: #ffb6b9; --btn-orange: #ffe0b2; 
            --success: #a8e6cf; --danger: #ffaaa5; 
        }
        body { 
            background: var(--bg-color); color: var(--text-color); font-family: 'Kanit', sans-serif; 
            margin: 0; padding: 20px; text-align: center; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 600px; }
        h2 { color: #ff8b94; font-weight: 600; margin-bottom: 20px; font-size: 24px; }
        .status-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .badge { background: var(--card-bg); padding: 8px 16px; border-radius: 20px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #f0e6e6; }
        .video-wrapper { position: relative; width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.06); background: #fff; border: 4px solid #fff; margin-bottom: 25px; }
        
        /* ⚠️ แก้ไขภาพกลับหัวตรงนี้: ใช้ transform หมุนภาพ 180 องศา */
        img { 
            width: 100%; 
            display: block; 
            object-fit: cover; 
            transform: rotate(180deg); 
        }
        
        .hud-overlay { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); padding: 5px 12px; border-radius: 15px; color: #ff5e62; font-weight: bold; font-size: 12px; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 280px; margin: 0 auto 30px auto; }
        .btn-ctrl { background: var(--btn-blue); color: #fff; border: none; padding: 20px 0; border-radius: 18px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #8ab4d1; transition: all 0.1s; font-family: inherit; }
        .btn-ctrl:active { transform: translateY(4px); box-shadow: 0 0 0 #8ab4d1; }
        .btn-stop { background: var(--btn-red); box-shadow: 0 4px 0 #e6a2a5; }
        .btn-stop:active { box-shadow: 0 0 0 #e6a2a5; }
        .up { grid-column: 2; } .left { grid-column: 1; grid-row: 2; } .stop { grid-column: 2; grid-row: 2; } .right { grid-column: 3; grid-row: 2; } .down { grid-column: 2; grid-row: 3; }
        .action-panel { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .btn-action { padding: 16px; border-radius: 25px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; font-family: inherit; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-mic { background: var(--btn-orange); color: #d68a20; }
        .btn-record { background: #e0f2f1; color: #00897b; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .online { background: var(--success); } .offline { background: var(--danger); }
        canvas { display: none; }
        @media (min-width: 480px) { .action-panel { flex-direction: row; justify-content: center; } .btn-action { width: 220px; } }
    </style>
</head>
<body>

    <div class="container">
        <h2>น้องหุ่นยนต์ 🤖✨</h2>
        
        <div class="status-bar">
            <div class="badge"><span id="cloud-dot" class="status-dot offline"></span>Cloud</div>
            <div class="badge"><span id="robot-dot" class="status-dot offline"></span>Robot</div>
            <div class="badge" style="color: #8ab4d1;">🔊 <span id="audio-status">เสียงปกติ</span></div>
        </div>

        <div class="video-wrapper">
            <div id="rec-indicator" class="hud-overlay">🔴 กำลังบันทึก...</div>
            <img id="video-stream" alt="💤 รอสัญญาณภาพจากหุ่นยนต์...">
        </div>
        
        <canvas id="record-canvas"></canvas>

        <div class="d-pad">
            <button class="btn-ctrl up" onmousedown="sendCmd('F')" onmouseup="sendCmd('S')" ontouchstart="sendCmd('F')" ontouchend="sendCmd('S')">ขึ้น</button>
            <button class="btn-ctrl left" onmousedown="sendCmd('L')" onmouseup="sendCmd('S')" ontouchstart="sendCmd('L')" ontouchend="sendCmd('S')">ซ้าย</button>
            <button class="btn-ctrl btn-stop stop" onmousedown="sendCmd('S')" ontouchstart="sendCmd('S')">หยุด</button>
            <button class="btn-ctrl right" onmousedown="sendCmd('R')" onmouseup="sendCmd('S')" ontouchstart="sendCmd('R')" ontouchend="sendCmd('S')">ขวา</button>
            <button class="btn-ctrl down" onmousedown="sendCmd('B')" onmouseup="sendCmd('S')" ontouchstart="sendCmd('B')" ontouchend="sendCmd('S')">ลง</button>
        </div>

        <div class="action-panel">
            <button id="mic-btn" class="btn-action btn-mic">🎙️ กดค้างเพื่อพูด</button>
            <button id="record-btn" class="btn-action btn-record">📹 เริ่มบันทึกวิดีโอ</button>
        </div>
    </div>

    <script>
        const WS_URL = 'wss://robot-relay-67r7.onrender.com'; 
        const ws = new WebSocket(WS_URL);
        ws.binaryType = 'arraybuffer';

        const cloudDot = document.getElementById('cloud-dot');
        const robotDot = document.getElementById('robot-dot');
        const audioStatus = document.getElementById('audio-status');
        const img = document.getElementById('video-stream');
        
        let robotTimeout;
        let audioContextOut = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        let nextPlayTime = 0; 

        // --- ระบบอัดวิดีโอ ---
        const recordBtn = document.getElementById('record-btn');
        const recIndicator = document.getElementById('rec-indicator');
        const canvas = document.getElementById('record-canvas');
        const ctx = canvas.getContext('2d');
        
        let mediaRecorder, recordedChunks = [], isRecording = false;

        recordBtn.onclick = () => { if (!isRecording) startRecording(); else stopRecording(); };

        function startRecording() {
            recordedChunks = [];
            canvas.width = img.width || 640; canvas.height = img.height || 480;
            const canvasStream = canvas.captureStream(20); 
            try { mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' }); } 
            catch (e) { mediaRecorder = new MediaRecorder(canvasStream); }
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `MyRobot_Video_${new Date().getTime()}.webm`;
                document.body.appendChild(a); a.click(); URL.revokeObjectURL(url);
            };
            mediaRecorder.start(); isRecording = true;
            recordBtn.innerHTML = "⏹️ หยุดบันทึก"; recordBtn.classList.add('recording'); recIndicator.style.display = 'block';
        }

        function stopRecording() {
            mediaRecorder.stop(); isRecording = false;
            recordBtn.innerHTML = "📹 เริ่มบันทึกวิดีโอ"; recordBtn.classList.remove('recording'); recIndicator.style.display = 'none';
        }

        // --- WebSocket ---
        ws.onopen = () => { cloudDot.className = "status-dot online"; };
        ws.onclose = () => { cloudDot.className = "status-dot offline"; robotDot.className = "status-dot offline"; };

        ws.onmessage = (event) => {
            if (typeof event.data === "string") {
                if (event.data === "ROBOT_PING") {
                    robotDot.className = "status-dot online";
                    clearTimeout(robotTimeout);
                    robotTimeout = setTimeout(() => { robotDot.className = "status-dot offline"; }, 5000);
                }
            } 
            else if (event.data instanceof ArrayBuffer) {
                const dataView = new DataView(event.data);
                // เช็ก Header เพื่อแยกว่าเป็นรูป 100% 
                if (dataView.byteLength >= 2 && dataView.getUint16(0, false) === 0xFFD8) {
                    const blob = new Blob([event.data], {type: 'image/jpeg'});
                    const url = URL.createObjectURL(blob);
                    img.src = url;
                    img.onload = () => URL.revokeObjectURL(url);
                } else {
                    playIncomingAudio(event.data);
                    audioStatus.innerText = "กำลังรับเสียง...";
                    setTimeout(() => { audioStatus.innerText = "เสียงปกติ"; }, 500);
                }
            }
        };

        function sendCmd(cmd) { if(ws.readyState === WebSocket.OPEN) ws.send(cmd); }

        // --- ระบบเสียงไมค์ฝั่ง WebApp ---
        let audioContextIn, processor, micStream, source;
        const micBtn = document.getElementById('mic-btn');

        function floatTo16BitPCM(input) {
            let output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                let s = input[i] * 8.0; // ขยายเสียง 8 เท่า
                s = Math.max(-1, Math.min(1, s));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output.buffer;
        }

        // ⚠️ สวิตช์ตัดไฟ ปิดไมค์แบบเด็ดขาด (ป้องกันไมค์ค้าง)
        function stopMic(e) {
            if (e) e.preventDefault();
            micBtn.style.background = "var(--btn-orange)"; 
            micBtn.style.color = "#d68a20";
            micBtn.innerHTML = "🎙️ กดค้างเพื่อพูด";
            
            if (processor) {
                processor.onaudioprocess = null; 
                processor.disconnect();
            }
            if (source) source.disconnect();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
        }

        micBtn.onmousedown = micBtn.ontouchstart = async (e) => {
            e.preventDefault();
            micBtn.style.background = "#fff"; 
            micBtn.style.color = "#d68a20"; 
            micBtn.innerHTML = "🔊 กำลังพูด...";
            
            if (audioContextOut.state === 'suspended') audioContextOut.resume();
            
            try {
                // ⚠️ เปิดระบบ AI ตัดเสียงหอน และเสียงรบกวนของเบราว์เซอร์
                micStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                audioContextIn = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                source = audioContextIn.createMediaStreamSource(micStream);
                processor = audioContextIn.createScriptProcessor(1024, 1, 1);
                
                source.connect(processor); 
                processor.connect(audioContextIn.destination);
                
                processor.onaudioprocess = (e) => {
                    if(ws.readyState === WebSocket.OPEN) ws.send(floatTo16BitPCM(e.inputBuffer.getChannelData(0)));
                };
            } catch (err) {
                console.error("Mic error:", err);
                stopMic();
            }
        };

        // ดักจับการปล่อยปุ่มทุกรูปแบบ 
        micBtn.onmouseup = stopMic;
        micBtn.ontouchend = stopMic;
        micBtn.onmouseleave = stopMic;
        micBtn.ontouchcancel = stopMic;

        // --- ระบบเล่นเสียงจากหุ่นยนต์ ---
        function playIncomingAudio(arrayBuffer) {
            if (audioContextOut.state === 'suspended') audioContextOut.resume();
            const int16Array = new Int16Array(arrayBuffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 0x7FFF;
            
            const audioBuffer = audioContextOut.createBuffer(1, float32Array.length, 16000);
            audioBuffer.getChannelData(0).set(float32Array);
            const source = audioContextOut.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContextOut.destination);
            
            if (nextPlayTime < audioContextOut.currentTime) {
                nextPlayTime = audioContextOut.currentTime + 0.05; 
            }
            source.start(nextPlayTime);
            nextPlayTime += audioBuffer.duration;
        }
    </script>
</body>
</html>
